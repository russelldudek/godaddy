<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Russell Dudek — GoDaddy Candidate Vision</title><meta name="description" content="Independent candidate vision for GoDaddy Director, Applied ML/AI."><style>:root{color-scheme:light}*{box-sizing:border-box}body{margin:0;background:#004249;color:#fff;font:16px/1.5 Arial,sans-serif;display:grid;min-height:100vh;place-items:center}.loader{width:min(680px,90vw);padding:40px;border:1px solid #00a4a6;border-radius:24px;background:#111;box-shadow:0 24px 70px #002b2f}.mark{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#9bf24d}.loader h1{font-size:clamp(34px,7vw,68px);line-height:.95;margin:18px 0}.bar{height:8px;background:#263b3d;border-radius:99px;overflow:hidden}.bar:after{content:'';display:block;width:42%;height:100%;background:#00a4a6;animation:load 1.2s ease-in-out infinite alternate}.status{color:#e6faf5;margin-top:14px}.error{color:#ffb8b8;white-space:pre-wrap}@keyframes load{to{transform:translateX(138%)}}@media(prefers-reduced-motion:reduce){.bar:after{animation:none;width:100%}}</style></head><body><main class="loader" aria-live="polite"><div class="mark">Russell Dudek / Candidate Vision</div><h1>Resolving the campaign.</h1><div class="bar" aria-hidden="true"></div><p class="status" id="status">Loading the verified artifact set…</p></main><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><script>
const parts=['source-00','source-01','source-02','source-03','source-04'];
const routePdf={
 'resume.html':'docs/Russell-Dudek-GoDaddy-Resume.pdf',
 'cover-letter.html':'docs/Russell-Dudek-GoDaddy-Cover-Letter.pdf',
 'interview-brief.html':'docs/Russell-Dudek-GoDaddy-Interview-Thesis-Brief.pdf',
 '120-day-plan.html':'docs/Russell-Dudek-GoDaddy-First-120-Days.pdf',
 'hard-objection.html':'docs/Russell-Dudek-GoDaddy-Hard-Objection-Analysis.pdf',
 'outcome-resolver.html':'docs/Russell-Dudek-GoDaddy-Entrepreneur-Outcome-Resolver.pdf',
 'executive-questions.html':'docs/Russell-Dudek-GoDaddy-Executive-Interview-Questions.pdf'
};
const visualIntegrityCss=String.raw`/* 2026-07-15 visual integrity system */
:root{
  color-scheme:light;
  --ui-ink:#22383c;
  --ui-ink-strong:#111f22;
  --ui-teal-text:#075f64;
  --ui-on-dark:#f3fffb;
  --ui-on-dark-soft:#e2f7f2;
  --ui-resolver:#0d3d43;
  --ui-resolver-row:#123d43;
  --ui-resolver-active:#166269;
}

/* Light surfaces: dark text is the default, including cards nested inside dark sections. */
body{color:var(--ui-ink)}
.paper,
.tension,
.contract-field,
.score-panel,
.phase,
.question,
.objection-box,
.sheet,
.callout,
.mini-record,
.compact-table th,
.compact-table td{color:var(--ui-ink)}
.paper h1,.paper h2,.paper h3,
.tension strong,
.contract-field b,
.score-panel h3,
.phase h3,
.question strong,
.objection-box .truth,
.sheet h1,.sheet h2,.sheet h3{color:var(--ui-ink-strong)}
.paper p,.paper li,.paper small,
.tension p,.tension .cost,
.contract-field p,
.score-panel p,.score-panel .metric,.score-panel small,
.phase li,
.question p,
.objection-box p,.objection-box li,
.sheet p,.sheet li,.sheet td,.sheet th,
.callout p,.mini-record span,
.doc-subtitle,.contact,.page-foot,.role-line span{color:var(--ui-ink)!important}
.eyebrow,.tension .vs,.phase .days,.question::before,
.contract-field::before,.doc-section h2,.doc-role,.mini-record b{color:var(--ui-teal-text)!important}
.cost{color:#34484b!important}
.score-tab{color:var(--ui-ink-strong)!important}
.score-tab[aria-selected="true"]{background:var(--gd-deep)!important;color:#fff!important}

/* Dark section copy stays light, while nested white cards remain dark via the rules above. */
.dark{color:var(--ui-on-dark)}
.dark > .section-inner > .section-head h2,
.dark > .section-inner > .section-head p,
.dark > .section-inner > .verdict{color:var(--ui-on-dark)!important}
.dark > .section-inner > .section-head .eyebrow{color:var(--ui-on-dark-soft)!important}
.dark .contract-field,.dark .contract-field *{color:var(--ui-ink)!important}
.dark .contract-field::before{color:var(--ui-teal-text)!important}

/* Teal evidence section. */
.teal{color:var(--ui-on-dark)}
.teal > .section-inner > .section-head h2,

/* Resolver: no pale text on light animation states. */
.resolver{background:var(--ui-resolver)!important;color:var(--ui-on-dark)!important;box-shadow:0 28px 70px rgba(0,66,73,.28)}

.query{background:#08373d!important;color:#f3fffb!important;border:1px solid rgba(255,255,255,.2)}
.record{background:var(--ui-resolver-row)!important;border:1px solid rgba(255,255,255,.32)!important;box-shadow:inset 5px 0 0 rgba(140,227,83,.94)!important;animation:resolve 5.2s ease-in-out infinite}

/* CTA, documents, and footer. */
.cta,.cta h2,.cta p{color:var(--ui-ink-strong)!important}

.button,.doc-actions a,.doc-actions button{color:#fff!important}

@keyframes resolve{
  0%,10%,100%{
    transform:translateX(0);

  }
  20%,42%{
    transform:translateX(6px);
    background:var(--ui-resolver-active);
    border-color:rgba(255,255,255,.86);
    box-shadow:inset 7px 0 0 var(--gd-lime),0 0 0 2px rgba(140,227,83,.24),0 10px 24px rgba(0,0,0,.18);

@media (prefers-reduced-motion:reduce){

const statusEl=document.getElementById('status');
function dataUri(mime,text){return `data:${mime};base64,${btoa(unescape(encodeURIComponent(text)))}`}
async function inlineCssImports(css,zip){
 const re=/@import\s+(?:url\()?['"]?([^'")]+)['"]?\)?\s*;/g;
 let output='',last=0;
 for(const match of css.matchAll(re)){
   output+=css.slice(last,match.index);
   const imported=zip.file(match[1]);
   if(imported)output+=await imported.async('text');
   last=match.index+match[0].length;
 }
 return output+css.slice(last);
}
async function render(zip,file){
 const entry=zip.file(file)||zip.file('index.html');
 if(!entry)throw new Error('Campaign entry point was not found.');
 const html=await entry.async('text');
 const doc=new DOMParser().parseFromString(html,'text/html');
 const scripts=[];
 for(const link of [...doc.querySelectorAll('link[rel="stylesheet"][href]')]){
   const asset=zip.file(link.getAttribute('href'));
   if(asset){
     const style=doc.createElement('style');
     style.textContent=await inlineCssImports(await asset.async('text'),zip);
     link.replaceWith(style);
   }
 }
 const visualStyle=doc.createElement('style');
 visualStyle.setAttribute('data-visual-integrity','2026-07-15');
 visualStyle.textContent=visualIntegrityCss;
 doc.head.appendChild(visualStyle);
 for(const stray of [...doc.querySelectorAll('footer img,footer svg')])stray.remove();
 for(const img of [...doc.querySelectorAll('img[src]')]){
   const src=img.getAttribute('src'),asset=zip.file(src);if(!asset)continue;
   if(src.endsWith('.svg'))img.src=dataUri('image/svg+xml',await asset.async('text'));
   else{const blob=await asset.async('blob');img.src=URL.createObjectURL(blob)}
 }
 for(const script of [...doc.querySelectorAll('script[src]')]){
   const asset=zip.file(script.getAttribute('src'));if(asset)scripts.push(await asset.async('text'));script.remove();
 }
 const expectedPdf=routePdf[file];
 if(expectedPdf){
   const actions=doc.querySelector('.doc-actions');
   if(actions&&!actions.querySelector('a[href$=".pdf"]')){
     const download=doc.createElement('a');
     download.href=expectedPdf;
     download.textContent='Download PDF';
     actions.prepend(download);
   }
   for(const button of [...doc.querySelectorAll('.doc-actions button')]){
     if(button.textContent.includes('Print')){button.textContent='Print';button.classList.add('light')}
   }
 }
 for(const a of [...doc.querySelectorAll('a[href]')]){
   const href=a.getAttribute('href');
   if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto:')||href.startsWith('tel:'))continue;
   if(href.endsWith('.html')){a.href=`?file=${encodeURIComponent(href)}`;continue;}
   if(href.toLowerCase().endsWith('.pdf')){
     const name=href.split('/').pop();
     const pdf=zip.file(href)||zip.file(`docs/${name}`)||zip.file(name);
     if(pdf){
       const bytes=await pdf.async('uint8array');
       a.href=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
       a.download=name;
       a.textContent='Download PDF';
     }
   }
 }
 const meta=doc.createElement('meta');meta.name='generator';meta.content='Independent candidate campaign';doc.head.appendChild(meta);
 document.open();document.write('<!doctype html>'+doc.documentElement.outerHTML);document.close();
 for(const code of scripts){const s=document.createElement('script');s.textContent=code;document.body.appendChild(s)}
}
(async()=>{
 try{
  statusEl.textContent='Opening the verified source package…';
  const chunks=await Promise.all(parts.map(async p=>{const r=await fetch(`.publish/${p}`,{cache:'no-store'});if(!r.ok)throw new Error(`${p}: ${r.status}`);return (await r.text()).trim()}));
  const raw=atob(chunks.join('')),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
  statusEl.textContent='Validating campaign routes…';
  const zip=await JSZip.loadAsync(bytes);
  const file=new URLSearchParams(location.search).get('file')||'index.html';
  if(file.includes('..')||!file.endsWith('.html'))throw new Error('Invalid campaign route.');
  await render(zip,file);
 }catch(err){console.error(err);statusEl.className='status error';statusEl.textContent='The campaign could not be opened.\n'+err.message;}
})();
</script></body></html>
