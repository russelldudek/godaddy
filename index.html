<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Russell Dudek — GoDaddy Candidate Vision</title><meta name="description" content="Independent candidate vision for GoDaddy Director, Applied ML/AI."><style>:root{color-scheme:light}*{box-sizing:border-box}body{margin:0;background:#004249;color:#fff;font:16px/1.5 Arial,sans-serif;display:grid;min-height:100vh;place-items:center}.loader{width:min(680px,90vw);padding:40px;border:1px solid #00a4a6;border-radius:24px;background:#111;box-shadow:0 24px 70px #002b2f}.mark{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#41db00}.loader h1{font-size:clamp(34px,7vw,68px);line-height:.95;margin:18px 0}.bar{height:8px;background:#263b3d;border-radius:99px;overflow:hidden}.bar:after{content:'';display:block;width:42%;height:100%;background:#00a4a6;animation:load 1.2s ease-in-out infinite alternate}.status{color:#dff7ee;margin-top:14px}.error{color:#ffb8b8;white-space:pre-wrap}@keyframes load{to{transform:translateX(138%)}}@media(prefers-reduced-motion:reduce){.bar:after{animation:none;width:100%}}</style></head><body><main class="loader" aria-live="polite"><div class="mark">Russell Dudek / Candidate Vision</div><h1>Resolving the campaign.</h1><div class="bar" aria-hidden="true"></div><p class="status" id="status">Loading the verified artifact set…</p></main><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><script>
const parts=['source-00','source-01','source-02','source-03','source-04'];
const pdfToHtml={
 'Russell-Dudek-GoDaddy-Resume.pdf':'resume.html',
 'Russell-Dudek-GoDaddy-Cover-Letter.pdf':'cover-letter.html',
 'Russell-Dudek-GoDaddy-Interview-Thesis-Brief.pdf':'interview-brief.html',
 'Russell-Dudek-GoDaddy-First-120-Days.pdf':'120-day-plan.html',
 'Russell-Dudek-GoDaddy-Hard-Objection-Analysis.pdf':'hard-objection.html',
 'Russell-Dudek-GoDaddy-Entrepreneur-Outcome-Resolver.pdf':'outcome-resolver.html',
 'Russell-Dudek-GoDaddy-Executive-Interview-Questions.pdf':'executive-questions.html'
};
const statusEl=document.getElementById('status');
function dataUri(mime,text){return `data:${mime};base64,${btoa(unescape(encodeURIComponent(text)))}`}
async function render(zip,file){
 const entry=zip.file(file)||zip.file('index.html');
 if(!entry)throw new Error('Campaign entry point was not found.');
 const html=await entry.async('text');
 const doc=new DOMParser().parseFromString(html,'text/html');
 const scripts=[];
 for(const link of [...doc.querySelectorAll('link[rel="stylesheet"][href]')]){
   const asset=zip.file(link.getAttribute('href'));
   if(asset){const style=doc.createElement('style');style.textContent=await asset.async('text');link.replaceWith(style)}
 }
 const contrastResponse=await fetch('contrast-overrides.css',{cache:'no-store'});
 if(contrastResponse.ok){const style=doc.createElement('style');style.setAttribute('data-visual-audit','contrast');style.textContent=await contrastResponse.text();doc.head.appendChild(style)}
 for(const stray of [...doc.querySelectorAll('footer img,footer svg')])stray.remove();
 for(const img of [...doc.querySelectorAll('img[src]')]){
   const src=img.getAttribute('src'),asset=zip.file(src);if(!asset)continue;
   if(src.endsWith('.svg'))img.src=dataUri('image/svg+xml',await asset.async('text'));
   else{const blob=await asset.async('blob');img.src=URL.createObjectURL(blob)}
 }
 for(const script of [...doc.querySelectorAll('script[src]')]){
   const asset=zip.file(script.getAttribute('src'));if(asset)scripts.push(await asset.async('text'));script.remove();
 }
 for(const a of [...doc.querySelectorAll('a[href]')]){
   const href=a.getAttribute('href');
   if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto:')||href.startsWith('tel:'))continue;
   if(href.endsWith('.html'))a.href=`?file=${encodeURIComponent(href)}`;
   else if(href.includes('/')){
     const name=href.split('/').pop(),target=pdfToHtml[name];
     if(target){
       if(file==='index.html'){a.href=`?file=${encodeURIComponent(target)}`;a.textContent=a.textContent.replace('Download','View')}
       else{a.href='#';a.textContent='Print / Save PDF';a.setAttribute('onclick','window.print();return false')}
     }
   }
 }
 const meta=doc.createElement('meta');meta.name='generator';meta.content='Independent candidate campaign';doc.head.appendChild(meta);
 document.open();document.write('<!doctype html>'+doc.documentElement.outerHTML);document.close();
 for(const code of scripts){const s=document.createElement('script');s.textContent=code;document.body.appendChild(s)}
}
(async()=>{
 try{
  statusEl.textContent='Opening the verified source package…';
  const chunks=await Promise.all(parts.map(async p=>{const r=await fetch(`.publish/${p}`);if(!r.ok)throw new Error(`${p}: ${r.status}`);return (await r.text()).trim()}));
  const raw=atob(chunks.join('')),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
  statusEl.textContent='Validating campaign routes…';
  const zip=await JSZip.loadAsync(bytes);
  const file=new URLSearchParams(location.search).get('file')||'index.html';
  if(file.includes('..')||!file.endsWith('.html'))throw new Error('Invalid campaign route.');
  await render(zip,file);
 }catch(err){console.error(err);statusEl.className='status error';statusEl.textContent='The campaign could not be opened.\n'+err.message;}
})();
</script></body></html>
