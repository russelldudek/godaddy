name: Publish approved campaign

on:
  push:
    branches: [main]
    paths:
      - 'publish.ready'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Reconstruct approved source
        run: |
          cat .publish/source-* | base64 --decode > /tmp/godaddy-source.zip
          mkdir -p /tmp/godaddy-campaign
          unzip -q /tmp/godaddy-source.zip -d /tmp/godaddy-campaign
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/godaddy-campaign/. .
      - name: Generate and verify PDFs
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint pypdf
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-GoDaddy-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-GoDaddy-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-GoDaddy-Interview-Thesis-Brief.pdf
          weasyprint 120-day-plan.html docs/Russell-Dudek-GoDaddy-First-120-Days.pdf
          weasyprint hard-objection.html docs/Russell-Dudek-GoDaddy-Hard-Objection-Analysis.pdf
          weasyprint outcome-resolver.html docs/Russell-Dudek-GoDaddy-Entrepreneur-Outcome-Resolver.pdf
          weasyprint executive-questions.html docs/Russell-Dudek-GoDaddy-Executive-Interview-Questions.pdf
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-GoDaddy-Resume.pdf': 2,
              'Russell-Dudek-GoDaddy-Cover-Letter.pdf': 1,
              'Russell-Dudek-GoDaddy-Interview-Thesis-Brief.pdf': 3,
              'Russell-Dudek-GoDaddy-First-120-Days.pdf': 3,
              'Russell-Dudek-GoDaddy-Hard-Objection-Analysis.pdf': 2,
              'Russell-Dudek-GoDaddy-Entrepreneur-Outcome-Resolver.pdf': 2,
              'Russell-Dudek-GoDaddy-Executive-Interview-Questions.pdf': 1,
          }
          for name, pages in expected.items():
              path = Path('docs') / name
              actual = len(PdfReader(str(path)).pages)
              if actual != pages:
                  raise SystemExit(f'{name}: expected {pages}, got {actual}')
              print(f'{name}: {actual} page(s)')
          PY
      - name: Publish complete campaign to main
        run: |
          git config user.name "candidate-campaign-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete GoDaddy candidate campaign"
          git push
