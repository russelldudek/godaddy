name: Repair and publish complete campaign

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/repair-and-publish.yml'
      - 'scripts/repair_campaign.py'
      - 'docs-download-readme.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: campaign-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document renderer and PDF verifier
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip weasyprint

      - name: Rebuild direct static campaign and PDFs
        run: python scripts/repair_campaign.py

      - name: Verify all downloadable PDFs
        run: |
          set -euo pipefail
          files=(
            docs/Russell-Dudek-GoDaddy-Resume.pdf
            docs/Russell-Dudek-GoDaddy-Cover-Letter.pdf
            docs/Russell-Dudek-GoDaddy-Interview-Thesis-Brief.pdf
            docs/Russell-Dudek-GoDaddy-First-120-Days.pdf
            docs/Russell-Dudek-GoDaddy-Hard-Objection-Analysis.pdf
            docs/Russell-Dudek-GoDaddy-Entrepreneur-Outcome-Resolver.pdf
            docs/Russell-Dudek-GoDaddy-Executive-Interview-Questions.pdf
          )
          for file in "${files[@]}"; do
            test -s "$file"
            pdfinfo "$file" >/dev/null
          done
          test "$(pdfinfo docs/Russell-Dudek-GoDaddy-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-GoDaddy-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = "1"

      - name: Commit complete campaign and downloadable documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css brand-tokens.css contrast-overrides.css app.js \
            resume.html cover-letter.html interview-brief.html 120-day-plan.html \
            hard-objection.html outcome-resolver.html executive-questions.html \
            assets docs research README.md brand-intelligence.md source-notes.md \
            campaign-audit.md .nojekyll .publish/source-00 .publish/source-01 \
            .publish/source-02 .publish/source-03 .publish/source-04
          if git diff --cached --quiet; then
            echo "No campaign changes were required."
          else
            git commit -m "Publish direct campaign files and downloadable PDFs"
            git push origin HEAD:main
          fi
