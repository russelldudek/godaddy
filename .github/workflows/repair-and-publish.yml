name: Repair and publish campaign source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/repair-and-publish.yml'
      - 'scripts/repair_campaign.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: campaign-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install PDF renderer
        run: python -m pip install --upgrade weasyprint

      - name: Rebuild campaign and PDFs
        run: python scripts/repair_campaign.py

      - name: Commit complete static campaign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css brand-tokens.css contrast-overrides.css app.js \
            resume.html cover-letter.html interview-brief.html 120-day-plan.html \
            hard-objection.html outcome-resolver.html executive-questions.html \
            assets docs research README.md brand-intelligence.md source-notes.md \
            campaign-audit.md .nojekyll .publish/source-00 .publish/source-01 \
            .publish/source-02 .publish/source-03 .publish/source-04
          if git diff --cached --quiet; then
            echo "No campaign changes were required."
          else
            git commit -m "Publish repaired campaign source and documents"
            git push origin HEAD:main
          fi
